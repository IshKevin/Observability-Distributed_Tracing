global:
  resolve_timeout: 5m

route:
  group_by: ["alertname", "endpoint"]
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 12h
  receiver: "log-receiver"
  routes:
    - match:
        severity: critical
      receiver: "log-receiver"
      continue: true

receivers:
  - name: "log-receiver"
    webhook_configs:
      - url: "http://app:5000/alerts"
        send_resolved: true
        # TODO add Slack URL: https://hooks.slack.com/services/xxx/yyy/zzz

inhibit_rules:
  - source_match:
      severity: critical
    target_match:
      severity: warning
    equal: ["alertname"]

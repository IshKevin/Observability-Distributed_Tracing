[SERVICE]
    Flush             5
    Daemon            off
    Log_Level         info
    Parsers_File      /fluent-bit/etc/parsers.conf
    HTTP_Server       on
    HTTP_Listen       0.0.0.0
    HTTP_Port         2020

[INPUT]
    Name              tail
    Tag               docker.*
    Path              /var/lib/docker/containers/*/*.log
    Parser            docker
    DB                /var/log/flb_docker.db
    Mem_Buf_Limit     5MB
    Skip_Long_Lines   on
    Refresh_Interval  10

[FILTER]
    Name              lua
    Match             docker.*
    script            /fluent-bit/etc/docker_meta.lua
    call              add_container_name

[OUTPUT]
    Name              loki
    Match             *
    Host              loki
    Port              3100
    labels            job=fluent-bit
    label_keys        $container, $stream
    line_format       json
    auto_kubernetes_labels off

groups:
  - name: flask-app
    rules:
      - alert: HighErrorRate
        expr: |
          (
            sum(rate(http_errors_total[5m]))
            /
            sum(rate(http_requests_total[5m]))
          ) * 100 > 5
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "High HTTP error rate"
          description: >
            Error rate is {{ $value | humanize }}% — above the 5% threshold for 2m.

    
      - alert: HighLatency
        expr: |
          histogram_quantile(
            0.95,
            sum(rate(http_request_duration_seconds_bucket[5m])) by (le, endpoint)
          ) > 0.3
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: "High P95 latency on {{ $labels.endpoint }}"
          description: >
            P95 latency is {{ $value | humanizeDuration }} on endpoint {{ $labels.endpoint }},
            above the 300ms SLO for 2m.

      - alert: AppDown
        expr: up{job="flask-app"} == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "Flask app is down"
          description: "The flask-app scrape target has been unreachable for more than 1 minute."
